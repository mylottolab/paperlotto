<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포인트 충전 — PaperLotto</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --board:#0c1020; --board-2:#111731; --board-line:#242c4d;
  --paper:#f6f1e4; --ink:#1c2130; --ink-dim:#5b5646;
  --gold:#b8862e; --gold-bright:#e0aa4e;
  --text-hi:#f2efe4; --text-mid:#a7adc7; --text-dim:#6b7195;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--board); color:var(--text-hi); min-height:100vh;
  font-family:'Inter',sans-serif; word-break:keep-all;
  background-image:linear-gradient(var(--board-line) 1px, transparent 1px), linear-gradient(90deg, var(--board-line) 1px, transparent 1px);
  background-size:64px 64px;
}
h1,h2{ font-family:'Fraunces',serif; margin:0; }
a{ color:inherit; text-decoration:none; }

header{
  position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between;
  padding:18px 32px; border-bottom:1px solid var(--board-line); flex-wrap:wrap; gap:10px;
  background:rgba(12,16,32,0.9); backdrop-filter:blur(6px);
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{ width:30px; height:30px; border-radius:6px; background:linear-gradient(135deg,var(--gold-bright),var(--gold)); display:flex; align-items:center; justify-content:center; color:var(--ink); font-weight:700; font-family:'Fraunces',serif; transform:rotate(-4deg); }
.brand-name{ font-size:17px; font-weight:600; }
.brand-name em{ font-style:normal; color:var(--gold-bright); }
nav{ font-size:13.5px; color:var(--text-mid); }

main{ max-width:560px; margin:0 auto; padding:60px 24px 90px; text-align:center; }
.balance-panel{ background:var(--paper); color:var(--ink); border-radius:14px; padding:32px; margin-bottom:24px; }
.balance-label{ font-size:12.5px; color:var(--ink-dim); margin-bottom:8px; }
.balance-num{ font-family:'IBM Plex Mono',monospace; font-size:32px; font-weight:700; color:#8a5b1c; }

.pack-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
.pack-card{
  background:var(--paper); color:var(--ink); border-radius:12px; padding:20px 12px;
  opacity:0.5; cursor:not-allowed;
}
.pack-card .pts{ font-family:'IBM Plex Mono',monospace; font-size:18px; font-weight:700; }
.pack-card .price{ font-size:12px; color:var(--ink-dim); margin-top:4px; }

.notice{
  background:rgba(184,134,46,0.1); border:1px solid rgba(184,134,46,0.3); border-radius:12px;
  padding:20px; font-size:13.5px; color:var(--text-mid); line-height:1.7;
}
@media (max-width:480px){
  .pack-grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">P</div>
    <div class="brand-name">Paper<em>Lotto</em></div>
  </div>
  <nav><a href="paperlotto_hub_mockup.html">← 전체 게임</a></nav>
</header>

<main>
  <div class="balance-panel">
    <div class="balance-label">현재 보유 포인트</div>
    <div class="balance-num" id="balanceNum">–</div>
  </div>

  <div class="pack-grid">
    <div class="pack-card"><div class="pts">500P</div><div class="price">준비 중</div></div>
    <div class="pack-card"><div class="pts">1,200P</div><div class="price">준비 중</div></div>
    <div class="pack-card"><div class="pts">3,000P</div><div class="price">준비 중</div></div>
  </div>

  <div class="notice">
    💳 포인트 충전(결제) 기능은 현재 준비 중입니다.<br>
    곧 PayPal · 나이스페이 결제를 통해 충전하실 수 있게 됩니다.
  </div>
</main>

<script>
const SUPABASE_URL = "https://wzrqaozlbfyejsbvnrxk.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_3KrYMzwrVlbYr-e9d8UiLA_KgvSs8tC";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { document.getElementById('balanceNum').textContent = '–'; return; }
  const { data: profile } = await sb.from('profiles').select('points_balance').eq('id', session.user.id).maybeSingle();
  document.getElementById('balanceNum').textContent = (profile ? profile.points_balance : 0) + 'P';
})();
</script>

</body>
</html>
