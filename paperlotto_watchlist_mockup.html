<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관심번호 — PaperLotto</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --board:#0c1020; --board-2:#111731; --board-line:#242c4d;
  --paper:#f6f1e4; --ink:#1c2130; --ink-dim:#5b5646;
  --gold:#b8862e; --gold-bright:#e0aa4e;
  --text-hi:#f2efe4; --text-mid:#a7adc7; --text-dim:#6b7195;
  --ok:#1f7a4f; --err:#c65a2e;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--board); color:var(--text-hi); min-height:100vh;
  font-family:'Inter',sans-serif; word-break:keep-all;
  background-image:linear-gradient(var(--board-line) 1px, transparent 1px), linear-gradient(90deg, var(--board-line) 1px, transparent 1px);
  background-size:64px 64px;
}
h1,h2{ font-family:'Fraunces',serif; margin:0; }
a{ color:inherit; text-decoration:none; }
.mono{ font-family:'IBM Plex Mono',monospace; }

header{
  position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between;
  padding:18px 32px; border-bottom:1px solid var(--board-line); flex-wrap:wrap; gap:10px;
  background:rgba(12,16,32,0.9); backdrop-filter:blur(6px);
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{ width:30px; height:30px; border-radius:6px; background:linear-gradient(135deg,var(--gold-bright),var(--gold)); display:flex; align-items:center; justify-content:center; color:var(--ink); font-weight:700; font-family:'Fraunces',serif; transform:rotate(-4deg); }
.brand-name{ font-size:17px; font-weight:600; }
.brand-name em{ font-style:normal; color:var(--gold-bright); }
nav{ display:flex; align-items:center; gap:18px; font-size:13.5px; color:var(--text-mid); }
.lang-toggle{ display:flex; border:1px solid var(--board-line); border-radius:20px; overflow:hidden; }
.lang-toggle button{ border:none; background:transparent; color:var(--text-dim); font-size:12px; font-weight:600; padding:6px 12px; cursor:pointer; font-family:'Inter',sans-serif; }
.lang-toggle button.active{ background:var(--gold); color:var(--ink); }

main{ max-width:820px; margin:0 auto; padding:28px 24px 90px; }
.page-title{ font-size:24px; font-weight:600; margin-bottom:6px; }
.page-sub{ font-size:13px; color:var(--text-mid); margin-bottom:20px; }

.panel{ background:var(--paper); color:var(--ink); border-radius:14px; padding:22px; margin-bottom:18px; }
.panel h3{ font-size:14px; margin-bottom:12px; }
label{ display:block; font-size:12px; font-weight:600; color:var(--ink-dim); margin:10px 0 6px; }
label:first-child{ margin-top:0; }
select, input[type="text"], input[type="number"]{
  width:100%; padding:10px 12px; border:1.5px solid rgba(28,33,48,0.15); border-radius:8px;
  font-size:13px; font-family:'Inter',sans-serif; color:var(--ink); background:#fff;
}
.row3{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.add-btn{
  margin-top:14px; padding:11px 16px; border:none; border-radius:8px; background:var(--ink); color:var(--paper);
  font-size:13px; font-weight:600; cursor:pointer;
}
.add-btn:hover{ background:#2a3145; }

.toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
.tb-btn{
  padding:9px 16px; border-radius:8px; border:1.5px solid var(--board-line); background:var(--board-2);
  color:var(--text-hi); font-size:12.5px; font-weight:600; cursor:pointer;
}
.tb-btn:hover{ border-color:var(--gold); }
.tb-btn:disabled{ opacity:0.4; cursor:not-allowed; }

.list-wrap{ background:var(--paper); color:var(--ink); border-radius:14px; overflow:hidden; }
.wl-row{
  display:flex; align-items:center; gap:12px; padding:14px 18px;
  border-bottom:1px solid rgba(28,33,48,0.08); flex-wrap:wrap;
}
.wl-row:last-child{ border-bottom:none; }
.wl-row input[type="checkbox"]{ width:16px; height:16px; flex-shrink:0; }
.wl-game{ font-size:11px; font-weight:700; color:var(--ink-dim); width:70px; flex-shrink:0; }
.wl-round{ font-size:11px; color:var(--ink-dim); font-family:'IBM Plex Mono',monospace; width:60px; flex-shrink:0; }
.wl-numbers{ display:flex; gap:4px; flex-wrap:wrap; min-width:120px; }
.pip{ width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; background:rgba(28,33,48,0.07); color:var(--ink-dim); flex-shrink:0; }
.pip.bonus{ background:var(--gold); color:var(--ink); }
.wl-memo{ flex:1; min-width:100px; font-size:12px; color:var(--ink-dim); font-style:italic; }
.wl-actions{ display:flex; gap:6px; flex-shrink:0; }
.icon-btn{
  width:28px; height:28px; border-radius:6px; border:none; cursor:pointer; font-size:12px;
  background:rgba(28,33,48,0.08); color:var(--ink-dim);
}
.icon-btn.danger{ background:rgba(198,90,46,0.12); color:var(--err); }
.icon-btn:hover{ opacity:0.75; }

.empty-note, .loading-note{ text-align:center; padding:40px 0; font-size:13px; color:var(--ink-dim); }

@media (max-width:640px){
  header{ padding:14px 16px; }
  main{ padding:20px 14px 70px; }
  .page-title{ font-size:20px; }
  .panel{ padding:16px; }
  .row3{ grid-template-columns:1fr; }
  .toolbar{ gap:8px; }
  .tb-btn{ flex:1 1 auto; font-size:11.5px; padding:9px 10px; }
  .wl-row{ gap:8px; }
  .wl-game, .wl-round{ width:auto; }
  .wl-memo{ flex:1 1 100%; order:5; }
  .pip{ width:22px; height:22px; font-size:10px; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">P</div>
    <div class="brand-name">Paper<em>Lotto</em></div>
  </div>
  <nav>
    <a href="paperlotto_my_entries_mockup.html" data-i18n="navEntries">← 내 등록내역</a>
    <div class="lang-toggle">
      <button data-lang="ko" type="button">KR</button>
      <button data-lang="en" class="active" type="button">EN</button>
      <button data-lang="ja" type="button">JA</button>
    </div>
  </nav>
</header>

<main>
  <div class="page-title" data-i18n="pageTitle">관심번호</div>
  <div class="page-sub" data-i18n="pageSub">등록내역에서 옮겨온 번호와 직접 추가한 번호를 한곳에서 관리합니다.</div>

  <div class="panel">
    <h3 data-i18n="addTitle">+ 새 번호 직접 추가</h3>
    <label data-i18n="gameLabel">게임</label>
    <select id="addGame"></select>
    <div class="row3">
      <div><label data-i18n="roundLabel">회차 (선택)</label><input type="number" id="addRound" placeholder="예: 1235"></div>
      <div><label data-i18n="memoLabel">메모 (선택)</label><input type="text" id="addMemo" placeholder="예: 생일 번호"></div>
    </div>
    <label data-i18n="mainLabel">메인 번호 (쉼표로 구분)</label>
    <input type="text" id="addMain" class="mono" placeholder="예: 3,7,15,22,29,41">
    <label data-i18n="bonusLabel">보너스 번호 (쉼표로 구분, 선택)</label>
    <input type="text" id="addBonus" class="mono" placeholder="예: 26">
    <button class="add-btn" id="addBtn" data-i18n="addBtn">추가하기</button>
  </div>

  <div class="toolbar">
    <button class="tb-btn" id="exportExcelBtn" data-i18n="exportExcel">엑셀 다운로드 (50P)</button>
    <button class="tb-btn" id="exportPdfBtn" data-i18n="exportPdf">PDF 생성 (50P)</button>
    <button class="tb-btn" id="deleteSelectedBtn" data-i18n="deleteSelected">선택 삭제</button>
  </div>

  <div class="list-wrap" id="listWrap">
    <div class="loading-note" data-i18n="loading">불러오는 중…</div>
  </div>
</main>

<script>
const i18n = {
  ko: {
    navEntries:"← 내 등록내역", pageTitle:"관심번호",
    pageSub:"등록내역에서 옮겨온 번호와 직접 추가한 번호를 한곳에서 관리합니다.",
    addTitle:"+ 새 번호 직접 추가", gameLabel:"게임", roundLabel:"회차 (선택)", memoLabel:"메모 (선택)",
    mainLabel:"메인 번호 (쉼표로 구분)", bonusLabel:"보너스 번호 (쉼표로 구분, 선택)", addBtn:"추가하기",
    exportExcel:"엑셀 다운로드 (50P)", exportPdf:"PDF 생성 (50P)", deleteSelected:"선택 삭제",
    loading:"불러오는 중…", empty:"아직 관심번호가 없습니다.", loginNeeded:"로그인이 필요합니다.",
    selectAtLeastOne:"먼저 항목을 선택해주세요.", deleteConfirm:"선택한 항목을 삭제할까요?",
    addNeedsMain:"메인 번호를 입력해주세요.",
    exportSuccess:function(n){ return n + "건 내보내기 완료 (50P 차감)"; },
    insufficientPointsMsg:function(balance, required){
      return "포인트가 부족합니다. (보유 " + balance + "P / 필요 " + required + "P)\n\n지금 포인트 충전 페이지로 이동할까요?";
    },
  },
  en: {
    navEntries:"← My Entries", pageTitle:"Watchlist",
    pageSub:"Manage numbers moved from your entries and numbers you added yourself, all in one place.",
    addTitle:"+ Add a new number set", gameLabel:"Game", roundLabel:"Round (optional)", memoLabel:"Memo (optional)",
    mainLabel:"Main numbers (comma-separated)", bonusLabel:"Bonus numbers (comma-separated, optional)", addBtn:"Add",
    exportExcel:"Download Excel (50P)", exportPdf:"Generate PDF (50P)", deleteSelected:"Delete Selected",
    loading:"Loading…", empty:"No watchlist items yet.", loginNeeded:"Please log in.",
    selectAtLeastOne:"Please select at least one item first.", deleteConfirm:"Delete the selected items?",
    addNeedsMain:"Please enter main numbers.",
    exportSuccess:function(n){ return n + " item(s) exported (50P charged)"; },
    insufficientPointsMsg:function(balance, required){
      return "You don't have enough points. (Balance: " + balance + "P / Needed: " + required + "P)\n\nGo to the points recharge page now?";
    },
  },
  ja: {
    navEntries:"← 登録した番号", pageTitle:"関心番号",
    pageSub:"登録内容から移動した番号と自分で追加した番号を一箇所で管理します。",
    addTitle:"+ 新しい番号を直接追加", gameLabel:"ゲーム", roundLabel:"回（任意）", memoLabel:"メモ（任意）",
    mainLabel:"メイン番号（カンマ区切り）", bonusLabel:"ボーナス番号（カンマ区切り、任意）", addBtn:"追加",
    exportExcel:"エクセルダウンロード (50P)", exportPdf:"PDF生成 (50P)", deleteSelected:"選択削除",
    loading:"読み込み中…", empty:"まだ関心番号がありません。", loginNeeded:"ログインが必要です。",
    selectAtLeastOne:"まず項目を選択してください。", deleteConfirm:"選択した項目を削除しますか？",
    addNeedsMain:"メイン番号を入力してください。",
    exportSuccess:function(n){ return n + "件エクスポート完了 (50P消費)"; },
    insufficientPointsMsg:function(balance, required){
      return "ポイントが不足しています。（保有 " + balance + "P / 必要 " + required + "P）\n\n今すぐポイント充電ページへ移動しますか？";
    },
  },
};
let currentLang = localStorage.getItem('paperlotto_lang') || 'en';
function applyLang(lang){
  currentLang = i18n[lang] ? lang : 'en';
  localStorage.setItem('paperlotto_lang', currentLang);
  document.documentElement.lang = currentLang;
  var t = i18n[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var key = el.getAttribute('data-i18n');
    if (typeof t[key] === 'string') el.innerHTML = t[key];
  });
  document.querySelectorAll('.lang-toggle button').forEach(function(b){ b.classList.toggle('active', b.dataset.lang === currentLang); });
  renderGameSelect();
  renderList();
}
document.querySelectorAll('.lang-toggle button').forEach(function(btn){ btn.addEventListener('click', function(){ applyLang(btn.dataset.lang); }); });

const SUPABASE_URL = "https://wzrqaozlbfyejsbvnrxk.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_3KrYMzwrVlbYr-e9d8UiLA_KgvSs8tC";
const WATCHLIST_URL = "https://wzrqaozlbfyejsbvnrxk.supabase.co/functions/v1/watchlist";
const EXPORT_CHARGE_URL = "https://wzrqaozlbfyejsbvnrxk.supabase.co/functions/v1/export-charge";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

const GAMES = [
  { id:'kr_lotto645', nameKo:'로또 6/45', nameEn:'Lotto 6/45', nameJa:'ロト6/45' },
  { id:'us_powerball', nameKo:'파워볼', nameEn:'Powerball', nameJa:'パワーボール' },
  { id:'us_megamillions', nameKo:'메가밀리언스', nameEn:'Mega Millions', nameJa:'メガミリオンズ' },
  { id:'eu_euromillions', nameKo:'유로밀리언스', nameEn:'EuroMillions', nameJa:'ユーロミリオンズ' },
  { id:'jp_miniloto', nameKo:'미니로또', nameEn:'Mini Loto', nameJa:'ミニロト' },
  { id:'jp_loto7', nameKo:'로또7', nameEn:'Loto 7', nameJa:'ロト7' },
  { id:'jp_loto6', nameKo:'로또6', nameEn:'Loto 6', nameJa:'ロト6' },
  { id:'ca_lottomax', nameKo:'로또맥스', nameEn:'Lotto Max', nameJa:'ロトマックス' },
  { id:'ca_lotto649', nameKo:'로또 6/49', nameEn:'Lotto 6/49', nameJa:'ロト6/49' },
  { id:'au_powerball', nameKo:'호주 파워볼', nameEn:'AU Powerball', nameJa:'豪パワーボール' },
  { id:'au_ozlotto', nameKo:'오즈로또', nameEn:'Oz Lotto', nameJa:'オズロト' },
  { id:'au_tattslotto', nameKo:'새터데이로또', nameEn:'Tatts Lotto', nameJa:'サタデーロト' },
];
function nameKey(){ return currentLang === 'ko' ? 'nameKo' : currentLang === 'ja' ? 'nameJa' : 'nameEn'; }
function renderGameSelect(){
  document.getElementById('addGame').innerHTML = GAMES.map(function(g){ return '<option value="'+g.id+'">'+g[nameKey()]+'</option>'; }).join('');
}

let accessToken = null;
let allRows = [];

async function loadWatchlist(){
  const listWrap = document.getElementById('listWrap');
  const t = i18n[currentLang];
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { listWrap.innerHTML = '<div class="empty-note">' + t.loginNeeded + '</div>'; return; }
  accessToken = session.access_token;

  const resp = await fetch(WATCHLIST_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
    body: JSON.stringify({ action: 'list' }),
  });
  const data = await resp.json();
  allRows = (data && data.rows) ? data.rows : [];
  renderList();
}

function renderList(){
  const listWrap = document.getElementById('listWrap');
  const t = i18n[currentLang];
  if (allRows.length === 0) { listWrap.innerHTML = '<div class="empty-note">' + t.empty + '</div>'; return; }

  listWrap.innerHTML = allRows.map(function(r){
    const mainPips = (r.main_numbers||[]).map(function(n){ return '<span class="pip">'+n+'</span>'; }).join('');
    const bonusPips = (r.bonus_numbers||[]).map(function(n){ return '<span class="pip bonus">'+n+'</span>'; }).join('');
    const g = GAMES.find(function(x){ return x.id === r.game_id; });
    const gameName = g ? g[nameKey()] : r.game_id;
    return '<div class="wl-row" data-id="'+r.id+'">' +
      '<input type="checkbox" class="wl-check" data-id="'+r.id+'">' +
      '<div class="wl-game">'+gameName+'</div>' +
      '<div class="wl-round mono">'+(r.round_no ? '#'+r.round_no : '-')+'</div>' +
      '<div class="wl-numbers">'+mainPips+bonusPips+'</div>' +
      '<div class="wl-memo">'+(r.memo || '')+'</div>' +
      '<div class="wl-actions"><button class="icon-btn danger" data-del="'+r.id+'">✕</button></div>' +
      '</div>';
  }).join('');

  listWrap.querySelectorAll('[data-del]').forEach(function(btn){
    btn.addEventListener('click', function(){ deleteOne(btn.dataset.del); });
  });
}

document.getElementById('addBtn').addEventListener('click', async function(){
  const t = i18n[currentLang];
  const gameId = document.getElementById('addGame').value;
  const roundRaw = document.getElementById('addRound').value.trim();
  const memo = document.getElementById('addMemo').value.trim();
  const mainRaw = document.getElementById('addMain').value.trim();
  const bonusRaw = document.getElementById('addBonus').value.trim();

  if (!mainRaw) { alert(t.addNeedsMain); return; }
  const mainNumbers = mainRaw.split(',').map(function(s){ return +s.trim(); }).filter(function(n){ return !isNaN(n); });
  const bonusNumbers = bonusRaw ? bonusRaw.split(',').map(function(s){ return +s.trim(); }).filter(function(n){ return !isNaN(n); }) : [];

  const btn = this;
  btn.disabled = true;
  try {
    const resp = await fetch(WATCHLIST_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
      body: JSON.stringify({
        action: 'add_manual', game_id: gameId,
        round_no: roundRaw ? +roundRaw : null,
        main_numbers: mainNumbers, bonus_numbers: bonusNumbers, memo: memo || null,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed');
    document.getElementById('addRound').value = '';
    document.getElementById('addMemo').value = '';
    document.getElementById('addMain').value = '';
    document.getElementById('addBonus').value = '';
    await loadWatchlist();
  } catch (e) {
    alert(e.message);
  } finally {
    btn.disabled = false;
  }
});

async function deleteOne(id){
  const t = i18n[currentLang];
  if (!confirm(t.deleteConfirm)) return;
  await fetch(WATCHLIST_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
    body: JSON.stringify({ action: 'delete', id: id }),
  });
  await loadWatchlist();
}

document.getElementById('deleteSelectedBtn').addEventListener('click', async function(){
  const t = i18n[currentLang];
  const ids = Array.from(document.querySelectorAll('.wl-check:checked')).map(function(c){ return c.dataset.id; });
  if (ids.length === 0) { alert(t.selectAtLeastOne); return; }
  if (!confirm(t.deleteConfirm)) return;
  await fetch(WATCHLIST_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
    body: JSON.stringify({ action: 'delete', ids: ids }),
  });
  await loadWatchlist();
});

function buildTitle(rows){
  const gameIds = [...new Set(rows.map(function(r){ return r.game_id; }))];
  const g = gameIds.length === 1 ? GAMES.find(function(x){ return x.id === gameIds[0]; }) : null;
  const gameLabel = g ? g[nameKey()] : (currentLang==='ko' ? '전체 게임' : currentLang==='ja' ? '全ゲーム' : 'All Games');
  const today = new Date().toISOString().slice(0,10);
  const suffix = currentLang==='ko' ? '관심번호' : currentLang==='ja' ? '関心番号' : 'Watchlist';
  return gameLabel + ' ' + today + ' ' + suffix;
}

async function chargeAndFetch(ids){
  const resp = await fetch(EXPORT_CHARGE_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
    body: JSON.stringify({ source: 'watchlist', ids: ids }),
  });
  const data = await resp.json();
  if (!resp.ok) {
    const err = new Error(data.error || 'Failed');
    err.code = data.code;
    err.required = data.required;
    err.balance = data.balance;
    throw err;
  }
  return data;
}

function showExportError(e){
  const t = i18n[currentLang];
  if (e.code === 'INSUFFICIENT_POINTS') {
    if (confirm(t.insufficientPointsMsg(e.balance, e.required))) {
      window.location.href = 'paperlotto_recharge_mockup.html';
    }
  } else {
    alert(e.message);
  }
}

document.getElementById('exportExcelBtn').addEventListener('click', async function(){
  const t = i18n[currentLang];
  const ids = Array.from(document.querySelectorAll('.wl-check:checked')).map(function(c){ return c.dataset.id; });
  if (ids.length === 0) { alert(t.selectAtLeastOne); return; }
  const btn = this;
  btn.disabled = true;
  try {
    const data = await chargeAndFetch(ids);
    const sheetRows = data.rows.map(function(r){
      const g = GAMES.find(function(x){ return x.id === r.game_id; });
      return {
        '게임': g ? g[nameKey()] : r.game_id,
        '회차': r.round_no || '',
        '메인번호': (r.main_numbers||[]).join(', '),
        '보너스번호': (r.bonus_numbers||[]).join(', '),
        '메모': r.memo || '',
      };
    });
    const ws = XLSX.utils.json_to_sheet(sheetRows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'watchlist');
    XLSX.writeFile(wb, buildTitle(data.rows).replace(/\s+/g,'_') + '.xlsx');
    alert(t.exportSuccess(data.rows.length));
  } catch (e) {
    showExportError(e);
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('exportPdfBtn').addEventListener('click', async function(){
  const t = i18n[currentLang];
  const ids = Array.from(document.querySelectorAll('.wl-check:checked')).map(function(c){ return c.dataset.id; });
  if (ids.length === 0) { alert(t.selectAtLeastOne); return; }
  const btn = this;
  btn.disabled = true;
  try {
    const data = await chargeAndFetch(ids);
    const title = buildTitle(data.rows);
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(14);
    doc.text(title, 14, 18);
    const body = data.rows.map(function(r){
      const g = GAMES.find(function(x){ return x.id === r.game_id; });
      return [g ? g[nameKey()] : r.game_id, r.round_no ? String(r.round_no) : '-', (r.main_numbers||[]).join(', '), (r.bonus_numbers||[]).join(', '), r.memo || ''];
    });
    doc.autoTable({ startY: 26, head: [['Game','Round','Main','Bonus','Memo']], body: body, styles: { fontSize: 9 } });
    doc.save(title.replace(/\s+/g,'_') + '.pdf');
    alert(t.exportSuccess(data.rows.length));
  } catch (e) {
    showExportError(e);
  } finally {
    btn.disabled = false;
  }
});

applyLang(currentLang);
loadWatchlist();
</script>

</body>
</html>
