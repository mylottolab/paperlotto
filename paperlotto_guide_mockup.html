*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{

h1,h2,h3{ font-family:'Fraunces',serif; margin:0; }

a{ color:inherit; }

header{

.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{ width:34px; height:34px; border-radius:7px; background:linear-gradient(135deg, var(--gold-bright), var(--gold)); display:flex; align-items:center; justify-content:center; color:var(--ink); font-family:'Fraunces',serif; font-weight:700; font-size:17px; transform:rotate(-4deg); }
.brand-name{ font-size:20px; font-weight:600; }

nav{ display:flex; align-items:center; gap:22px; font-size:14px; color:var(--text-mid); flex-wrap:wrap; }
nav a{ text-decoration:none; } nav a:hover{ color:var(--text-hi); }
.lang-toggle{ display:flex; border:1px solid var(--board-line); border-radius:20px; overflow:hidden; }
.lang-toggle button{ border:none; background:transparent; color:var(--text-dim); font-size:12px; font-weight:600; padding:6px 14px; cursor:pointer; font-family:'Inter',sans-serif; }
.lang-toggle button.active{ background:var(--gold); color:var(--ink); }

.page-head{ max-width:880px; margin:36px auto 0; padding:0 24px; }
.page-eyebrow{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:700; letter-spacing:1.6px; color:var(--gold-bright); }
.page-title{ font-size:clamp(26px,4vw,36px); font-weight:600; margin-top:10px; }
.page-sub{ color:var(--text-mid); font-size:14.5px; margin-top:10px; max-width:640px; line-height:1.7; }

.region-filter{ max-width:880px; margin:26px auto 0; padding:0 24px; display:flex; gap:8px; flex-wrap:wrap; }
.region-btn{ border:1px solid var(--board-line); background:transparent; color:var(--text-mid); font-size:12.5px; font-family:'Inter',sans-serif; padding:6px 14px; border-radius:20px; cursor:pointer; }
.region-btn.active{ background:var(--gold); color:var(--ink); border-color:var(--gold); font-weight:600; }

.guide-list{ max-width:880px; margin:22px auto 60px; padding:0 24px; display:flex; flex-direction:column; gap:16px; }

.game-card{ background:var(--paper); color:var(--ink); border-radius:14px; padding:0; overflow:hidden; box-shadow:0 14px 30px -18px rgba(0,0,0,0.55); }
.game-card::before{ content:''; display:block; height:5px; background:var(--accent, var(--gold)); }
.game-card-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:18px 22px; cursor:pointer; }
.game-card-title{ display:flex; align-items:center; gap:10px; }
.game-flag{ font-size:20px; }
.game-name{ font-size:16.5px; font-weight:600; }
.game-name-sub{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-dim); margin-top:2px; }
.game-toggle-icon{ font-family:'IBM Plex Mono',monospace; font-size:14px; color:var(--ink-dim); transition:transform .2s; flex-shrink:0; }
.game-card.open .game-toggle-icon{ transform:rotate(45deg); }

.game-card-body{ display:none; padding:0 22px 22px; }
.game-card.open .game-card-body{ display:block; }

.strategy-note{ font-size:12px; color:var(--ink-dim); margin-bottom:14px; font-style:italic; }
.strategy-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:12px; }
.strategy-list li{ display:flex; gap:12px; align-items:flex-start; font-size:14px; line-height:1.7; }
.strategy-list .mark{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--gold); font-weight:700; margin-top:3px; flex-shrink:0; }
.strategy-list .detail-link{ display:inline-block; margin-top:6px; font-size:12.5px; color:var(--gold); text-decoration:underline; }

.pending-note{ font-size:13.5px; color:var(--ink-dim); padding:6px 0 2px; }

.footer-disclaimer{ max-width:880px; margin:0 auto 50px; padding:0 24px; font-size:12px; color:var(--text-dim); line-height:1.7; }

@media (max-width:640px){
  header{ padding:16px 18px; }
  nav{ gap:14px; font-size:13px; order:3; width:100%; justify-content:space-between; }
  .game-card-head{ padding:15px 16px; }
  .game-card-body{ padding:0 16px 18px; }

          "固定ジャックポット（500万ドル）なので、「今週はいくら積み上がったか」を気にせず、純粋に確率と番号戦略に集中できます。",
          "韓国ロト6/45と構造が最も似ている（6個選択）ため、区間分散・奇偶比率戦略をそのまま応用できます。",
          "ゴールドボールは純粋なランダムで戦略の余地はありませんが、「今週は白いボールが何個残っているか」を確認する楽しみ方があります。",
        ],
      },
    },
  },
};

let currentLang = 'ko';
let currentRegion = 'all';
const openCards = new Set();

function renderRegionFilter(){
  const t = I18N[currentLang];
  const regions = [
    ['all', t.regionAll], ['kr', t.regionKr], ['us', t.regionUs], ['jp', t.regionJp],
    ['ca', t.regionCa], ['au', t.regionAu], ['eu', t.regionEu],
  ];
  const wrap = document.getElementById('regionFilter');
  wrap.innerHTML = regions.map(([key, label]) =>
    `<button class="region-btn${key===currentRegion?' active':''}" data-region="${key}" type="button">${label}</button>`
  ).join('');
  wrap.querySelectorAll('.region-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ currentRegion = btn.dataset.region; render(); });
  });
}

function renderGuideList(){
  const t = I18N[currentLang];
  const list = document.getElementById('guideList');
  const filtered = currentRegion==='all' ? GAMES : GAMES.filter(g=>g.region===currentRegion);

  list.innerHTML = filtered.map(g=>{
    const nameInfo = t.names[g.id];
    const isOpen = openCards.has(g.id);
    let bodyHtml;
    if (g.status === 'ready'){
      const s = t.strategy[g.id];
      bodyHtml = `<div class="strategy-note">${s.note}</div>
        <ul class="strategy-list">
          ${s.items.map((text,i)=>`<li><span class="mark">0${i+1}</span>${text}</li>`).join('')}
        </ul>
        <a class="detail-link" href="${g.detail}">${t.readMore}</a>`;
    } else {
      bodyHtml = `<div class="pending-note">${t.pending}</div>`;
    }
    return `<div class="game-card${isOpen?' open':''}" data-id="${g.id}" style="--accent:${g.accent}">
      <div class="game-card-head">
        <div class="game-card-title">
          <span class="game-flag">${g.flag}</span>
          <div>
            <div class="game-name">${nameInfo.name}</div>
            <div class="game-name-sub">${nameInfo.sub}</div>
          </div>
        </div>
        <span class="game-toggle-icon">+</span>
      </div>
      <div class="game-card-body">${bodyHtml}</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.game-card-head').forEach(head=>{
    head.addEventListener('click', ()=>{
      const card = head.closest('.game-card');
      const id = card.dataset.id;
      if (openCards.has(id)) openCards.delete(id); else openCards.add(id);
      card.classList.toggle('open');
    });
  });
}

function applyStaticI18n(){
  const t = I18N[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });
}

function render(){
  applyStaticI18n();
  renderRegionFilter();
  renderGuideList();
}

document.querySelectorAll('.lang-toggle button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentLang = btn.dataset.lang;
    document.querySelectorAll('.lang-toggle button').forEach(b=>b.classList.toggle('active', b===btn));
    render();
  });
});

// 첫 번째 게임은 기본으로 펼쳐서 보여줌
openCards.add(GAMES[4].id); // jp_miniloto (완료된 것 중 하나를 예시로)
render();
</script>
