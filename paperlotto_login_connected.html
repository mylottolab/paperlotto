<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 / 가입 — PaperLotto</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --board:#0c1020; --board-2:#111731; --board-line:#242c4d;
  --paper:#f6f1e4; --paper-2:#efe8d6; --ink:#1c2130; --ink-dim:#5b5646;
  --gold:#b8862e; --gold-bright:#e0aa4e;
  --text-hi:#f2efe4; --text-mid:#a7adc7; --text-dim:#6b7195;
  --err:#c65a2e;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh; background:var(--board); color:var(--text-hi);
  font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;
  word-break:keep-all; overflow-wrap:break-word;
  background-image:linear-gradient(var(--board-line) 1px, transparent 1px), linear-gradient(90deg, var(--board-line) 1px, transparent 1px);
  background-size:64px 64px; background-color:var(--board);
  display:flex; align-items:center; justify-content:center; padding:40px 20px;
}
h1,h2{ font-family:'Fraunces',serif; margin:0; }
a{ color:inherit; }
:focus-visible{ outline:2px solid var(--gold-bright); outline-offset:2px; border-radius:4px; }

.wrap{ width:100%; max-width:400px; }
.brand{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:32px; }
.brand-mark{ width:34px; height:34px; border-radius:7px; background:linear-gradient(135deg, var(--gold-bright), var(--gold)); display:flex; align-items:center; justify-content:center; color:var(--ink); font-family:'Fraunces',serif; font-weight:700; font-size:17px; transform:rotate(-4deg); }
.brand-name{ font-size:19px; font-weight:600; color:var(--text-hi); }
.brand-name em{ font-style:normal; color:var(--gold-bright); }

.card{
  background:var(--paper); color:var(--ink); border-radius:16px;
  padding:36px 32px; box-shadow:0 24px 50px -20px rgba(0,0,0,0.6);
}

.tabs{ display:flex; background:rgba(28,33,48,0.06); border-radius:10px; padding:4px; margin-bottom:26px; }
.tabs button{
  flex:1; padding:10px; border:none; background:transparent; border-radius:8px;
  font-family:'Inter',sans-serif; font-size:14px; font-weight:600; color:var(--ink-dim); cursor:pointer;
}
.tabs button.active{ background:var(--paper); color:var(--ink); box-shadow:0 2px 8px rgba(0,0,0,0.08); }

h1.title{ font-size:22px; font-weight:600; margin-bottom:6px; }
.subtitle{ font-size:13px; color:var(--ink-dim); margin-bottom:24px; line-height:1.6; }

.google-btn{
  width:100%; display:flex; align-items:center; justify-content:center; gap:10px;
  padding:12px; border:1.5px solid rgba(28,33,48,0.15); border-radius:10px;
  background:#fff; color:var(--ink); font-family:'Inter',sans-serif; font-size:14px; font-weight:600;
  cursor:pointer; margin-bottom:18px;
}
.google-btn:hover{ background:#fafafa; }
.google-btn svg{ width:18px; height:18px; }

.divider{ display:flex; align-items:center; gap:12px; margin:18px 0; color:var(--ink-dim); font-size:12px; }
.divider::before, .divider::after{ content:''; flex:1; height:1px; background:rgba(28,33,48,0.15); }

label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-dim); margin-bottom:6px; }
input[type="email"], input[type="password"], input[type="text"]{
  width:100%; padding:12px 14px; border:1.5px solid rgba(28,33,48,0.15); border-radius:9px;
  font-family:'Inter',sans-serif; font-size:14px; color:var(--ink); background:#fff;
  margin-bottom:16px; outline:none;
}
input:focus{ border-color:var(--gold); }

.submit-btn{
  width:100%; padding:13px; border:none; border-radius:9px; background:var(--ink); color:var(--paper);
  font-family:'Inter',sans-serif; font-size:14.5px; font-weight:600; cursor:pointer; margin-top:4px;
}
.submit-btn:hover{ background:#2a3145; }

.fine-print{ margin-top:18px; font-size:11.5px; color:var(--ink-dim); line-height:1.7; text-align:center; }
.fine-print a{ color:#8a5b1c; text-decoration:underline; }

.lang-note{
  margin-top:24px; display:flex; align-items:center; justify-content:center; gap:8px;
  font-size:11.5px; color:var(--text-dim);
}
.lang-note select{
  background:transparent; border:1px solid var(--board-line); color:var(--text-mid);
  border-radius:6px; padding:4px 8px; font-size:11.5px; font-family:'Inter',sans-serif;
}

.footer-note{ margin-top:28px; text-align:center; font-size:11px; color:var(--text-dim); line-height:1.8; }

@media (max-width:640px){
  body{ padding:24px 16px; }
  .card{ padding:28px 22px; }
  /* 입력창 글자가 16px보다 작으면 iOS Safari가 탭할 때마다 화면을 자동으로 확대합니다 — 16px로 고정해서 방지 */
  input[type="email"], input[type="password"], input[type="text"], .lang-note select{
    font-size:16px;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-mark">P</div>
    <div class="brand-name">Paper<em>Lotto</em></div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="active" id="tabLogin" type="button" data-i18n="tabLogin">로그인</button>
      <button id="tabSignup" type="button" data-i18n="tabSignup">회원가입</button>
    </div>

    <div id="panelLogin">
      <button class="google-btn" type="button" id="googleLoginBtn">
        <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3c-7.5 0-14 4.3-17.7 10.7z"/><path fill="#4CAF50" d="M24 45c5.5 0 10.4-1.9 14.2-5l-6.6-5.4C29.6 36.3 27 37 24 37c-5.2 0-9.6-3.3-11.2-8l-6.6 5.1C9.9 40.5 16.4 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.6 5.4C41.5 36 45 30.5 45 24c0-1.2-.1-2.3-.4-3.5z"/></svg>
        <span data-i18n="googleLogin">Google로 계속하기</span>
      </button>

      <div class="divider" data-i18n="or">또는</div>

      <label for="loginEmail" data-i18n="email">이메일</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
      <label for="loginPw" data-i18n="password">비밀번호</label>
      <input type="password" id="loginPw" placeholder="••••••••">

      <div id="loginMsg" style="display:none; font-size:12.5px; margin-bottom:14px; padding:10px 12px; border-radius:8px; line-height:1.5;"></div>

      <button class="submit-btn" type="button" id="loginSubmitBtn" data-i18n="loginBtn">로그인</button>
      <div class="fine-print"><a href="#" data-i18n="forgotPw">비밀번호를 잊으셨나요?</a></div>
    </div>

    <div id="panelSignup" style="display:none;">
      <h1 class="title" data-i18n="signupTitle">가입은 30초면 충분해요</h1>
      <div class="subtitle" data-i18n="signupSubtitle">이메일과 비밀번호만 있으면 바로 시작할 수 있어요. 닉네임과 언어 설정은 자동으로 입력되며, 나중에 마이페이지에서 언제든 바꾸실 수 있어요.</div>

      <button class="google-btn" type="button" id="googleSignupBtn">
        <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.6-6 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.2-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.5 15.9 18.9 13 24 13c3.1 0 5.8 1.1 8 3l6-6C34.6 5.1 29.6 3 24 3c-7.5 0-14 4.3-17.7 10.7z"/><path fill="#4CAF50" d="M24 45c5.5 0 10.4-1.9 14.2-5l-6.6-5.4C29.6 36.3 27 37 24 37c-5.2 0-9.6-3.3-11.2-8l-6.6 5.1C9.9 40.5 16.4 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.6 5.4C41.5 36 45 30.5 45 24c0-1.2-.1-2.3-.4-3.5z"/></svg>
        <span data-i18n="googleSignup">Google로 가입하기</span>
      </button>

      <div class="divider" data-i18n="or">또는</div>

      <label for="suEmail" data-i18n="email">이메일</label>
      <input type="email" id="suEmail" placeholder="you@example.com">
      <label for="suPw" data-i18n="password">비밀번호</label>
      <input type="password" id="suPw" placeholder="8자 이상" data-i18n-placeholder="pwPlaceholder">

      <div id="signupMsg" style="display:none; font-size:12.5px; margin-bottom:14px; padding:10px 12px; border-radius:8px; line-height:1.5;"></div>

      <button class="submit-btn" type="button" id="signupSubmitBtn" data-i18n="signupBtn">계정 만들기</button>
      <div class="fine-print" data-i18n="terms">가입 시 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의하게 됩니다.</div>
    </div>
  </div>

  <div class="lang-note">
    🌐 <span data-i18n="siteLang">Site language</span>:
    <select id="langSelect">
      <option value="ko">한국어</option>
      <option value="en" selected>English</option>
      <option value="ja">日本語</option>
    </select>
  </div>

  <div class="footer-note" data-i18n="footerNote">
    PaperLotto는 복권을 판매하지 않으며, 어떠한 형태의 상금도 지급하지 않습니다.<br>
    가입 없이도 <a href="#" style="color:#a7adc7;text-decoration:underline;">비회원으로 둘러보기</a>가 가능합니다.
  </div>
</div>

<script>
const tabLogin = document.getElementById('tabLogin');
const tabSignup = document.getElementById('tabSignup');
const panelLogin = document.getElementById('panelLogin');
const panelSignup = document.getElementById('panelSignup');

tabLogin.addEventListener('click', () => {
  tabLogin.classList.add('active'); tabSignup.classList.remove('active');
  panelLogin.style.display = 'block'; panelSignup.style.display = 'none';
});
tabSignup.addEventListener('click', () => {
  tabSignup.classList.add('active'); tabLogin.classList.remove('active');
  panelSignup.style.display = 'block'; panelLogin.style.display = 'none';
});

// =====================================================
// 다국어(i18n) — 한국어 / 영어 / 일본어
// =====================================================
const i18n = {
  ko: {
    pageTitle: "로그인 / 가입 — PaperLotto",
    tabLogin: "로그인", tabSignup: "회원가입",
    googleLogin: "Google로 계속하기", googleSignup: "Google로 가입하기",
    or: "또는", email: "이메일", password: "비밀번호",
    loginBtn: "로그인", loginBtnLoading: "로그인 중...",
    forgotPw: "비밀번호를 잊으셨나요?",
    signupTitle: "가입은 30초면 충분해요",
    signupSubtitle: "이메일과 비밀번호만 있으면 바로 시작할 수 있어요. 닉네임과 언어 설정은 자동으로 입력되며, 나중에 마이페이지에서 언제든 바꾸실 수 있어요.",
    pwPlaceholder: "8자 이상",
    signupBtn: "계정 만들기", signupBtnLoading: "계정 만드는 중...",
    terms: '가입 시 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의하게 됩니다.',
    siteLang: "언어 설정",
    footerNote: 'PaperLotto는 복권을 판매하지 않으며, 어떠한 형태의 상금도 지급하지 않습니다.<br>가입 없이도 <a href="#" style="color:#a7adc7;text-decoration:underline;">비회원으로 둘러보기</a>가 가능합니다.',
    errFillBoth: "이메일과 비밀번호를 입력해주세요.",
    errPwLength: "비밀번호는 8자 이상이어야 합니다.",
    errLoginFail: "로그인 실패: ",
    errSignupFail: "가입 실패: ",
    msgLoginSuccess: "로그인 성공! 잠시 후 이동합니다...",
    msgSignupSuccess: "가입이 완료되었습니다! 닉네임과 언어는 자동으로 설정되었어요. 마이페이지에서 언제든 변경하실 수 있습니다. 잠시 후 이동합니다...",
    errGoogleFail: "Google 로그인 실패: ",
  },
  en: {
    pageTitle: "Login / Sign up — PaperLotto",
    tabLogin: "Log in", tabSignup: "Sign up",
    googleLogin: "Continue with Google", googleSignup: "Sign up with Google",
    or: "or", email: "Email", password: "Password",
    loginBtn: "Log in", loginBtnLoading: "Logging in...",
    forgotPw: "Forgot your password?",
    signupTitle: "Sign up takes 30 seconds",
    signupSubtitle: "All you need is an email and password. Your nickname and language are set automatically — you can change them anytime in My Page.",
    pwPlaceholder: "8+ characters",
    signupBtn: "Create account", signupBtnLoading: "Creating account...",
    terms: 'By signing up, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.',
    siteLang: "Site language",
    footerNote: 'PaperLotto does not sell lottery tickets and does not pay out any prizes.<br>You can also <a href="#" style="color:#a7adc7;text-decoration:underline;">browse as a guest</a> without signing up.',
    errFillBoth: "Please enter both email and password.",
    errPwLength: "Password must be at least 8 characters.",
    errLoginFail: "Login failed: ",
    errSignupFail: "Sign up failed: ",
    msgLoginSuccess: "Login successful! Redirecting...",
    msgSignupSuccess: "Account created! Your nickname and language were set automatically — you can change them anytime in My Page. Redirecting...",
    errGoogleFail: "Google login failed: ",
  },
  ja: {
    pageTitle: "ログイン / 新規登録 — PaperLotto",
    tabLogin: "ログイン", tabSignup: "新規登録",
    googleLogin: "Googleで続ける", googleSignup: "Googleで登録",
    or: "または", email: "メールアドレス", password: "パスワード",
    loginBtn: "ログイン", loginBtnLoading: "ログイン中...",
    forgotPw: "パスワードをお忘れですか？",
    signupTitle: "登録は30秒で完了します",
    signupSubtitle: "メールアドレスとパスワードだけで始められます。ニックネームと言語設定は自動で入力され、マイページでいつでも変更できます。",
    pwPlaceholder: "8文字以上",
    signupBtn: "アカウント作成", signupBtnLoading: "作成中...",
    terms: '登録すると<a href="#">利用規約</a>および<a href="#">プライバシーポリシー</a>に同意したことになります。',
    siteLang: "表示言語",
    footerNote: 'PaperLottoは宝くじを販売しておらず、いかなる形式の賞金も支払いません。<br>登録なしでも<a href="#" style="color:#a7adc7;text-decoration:underline;">ゲストとして閲覧</a>できます。',
    errFillBoth: "メールアドレスとパスワードを入力してください。",
    errPwLength: "パスワードは8文字以上で入力してください。",
    errLoginFail: "ログイン失敗: ",
    errSignupFail: "登録失敗: ",
    msgLoginSuccess: "ログイン成功！まもなく移動します...",
    msgSignupSuccess: "登録が完了しました！ニックネームと言語は自動設定されました。マイページでいつでも変更できます。まもなく移動します...",
    errGoogleFail: "Googleログイン失敗: ",
  },
};

let currentLang = "ko";

function applyLang(lang) {
  currentLang = i18n[lang] ? lang : "ko";
  const t = i18n[currentLang];
  document.documentElement.lang = currentLang;
  document.title = t.pageTitle;

  document.querySelectorAll("[data-i18n]").forEach((el) => {
    const key = el.getAttribute("data-i18n");
    if (t[key] !== undefined) el.innerHTML = t[key];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
    const key = el.getAttribute("data-i18n-placeholder");
    if (t[key] !== undefined) el.setAttribute("placeholder", t[key]);
  });
}

const langSelectEl = document.getElementById("langSelect");
langSelectEl.addEventListener("change", () => applyLang(langSelectEl.value));
applyLang(langSelectEl.value); // 초기 로드 시 select의 기본값(en)으로 적용

// =====================================================
// Supabase 연결
// =====================================================
const SUPABASE_URL = "https://wzrqaozlbfyejsbvnrxk.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_3KrYMzwrVlbYr-e9d8UiLA_KgvSs8tC";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

// 로그인/가입 성공 후 이동할 페이지 (허브 페이지)
const REDIRECT_AFTER_AUTH = "https://mylottolab.github.io/paperlotto/paperlotto_hub_mockup.html";

function showMsg(el, text, type) {
  el.style.display = 'block';
  el.textContent = text;
  if (type === 'error') {
    el.style.background = 'rgba(198,90,46,0.12)';
    el.style.color = '#a8451f';
  } else {
    el.style.background = 'rgba(58,140,90,0.12)';
    el.style.color = '#2f7a4d';
  }
}

// ── 이메일/비밀번호 로그인 ──
const loginMsg = document.getElementById('loginMsg');
const loginSubmitBtn = document.getElementById('loginSubmitBtn');

loginSubmitBtn.addEventListener('click', async () => {
  const t = i18n[currentLang];
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPw').value;

  if (!email || !password) {
    showMsg(loginMsg, t.errFillBoth, 'error');
    return;
  }

  loginSubmitBtn.disabled = true;
  loginSubmitBtn.textContent = t.loginBtnLoading;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  loginSubmitBtn.disabled = false;
  loginSubmitBtn.textContent = t.loginBtn;

  if (error) {
    showMsg(loginMsg, t.errLoginFail + error.message, 'error');
    return;
  }

  showMsg(loginMsg, t.msgLoginSuccess, 'success');
  setTimeout(() => { window.location.href = REDIRECT_AFTER_AUTH; }, 800);
});

// ── 이메일/비밀번호 회원가입 ──
const signupMsg = document.getElementById('signupMsg');
const signupSubmitBtn = document.getElementById('signupSubmitBtn');

signupSubmitBtn.addEventListener('click', async () => {
  const t = i18n[currentLang];
  const email = document.getElementById('suEmail').value.trim();
  const password = document.getElementById('suPw').value;
  const preferredLang = document.getElementById('langSelect').value;

  if (!email || !password) {
    showMsg(signupMsg, t.errFillBoth, 'error');
    return;
  }
  if (password.length < 8) {
    showMsg(signupMsg, t.errPwLength, 'error');
    return;
  }

  signupSubmitBtn.disabled = true;
  signupSubmitBtn.textContent = t.signupBtnLoading;

  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: {
      data: {
        // nickname은 비워두면 DB 트리거가 이메일 앞부분으로 자동 채웁니다.
        preferred_lang: preferredLang
      }
    }
  });

  signupSubmitBtn.disabled = false;
  signupSubmitBtn.textContent = t.signupBtn;

  if (error) {
    showMsg(signupMsg, t.errSignupFail + error.message, 'error');
    return;
  }

  showMsg(signupMsg, t.msgSignupSuccess, 'success');
  setTimeout(() => { window.location.href = REDIRECT_AFTER_AUTH; }, 1600);
});

// ── Google OAuth 로그인/가입 (둘 다 동일 동작) ──
async function loginWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: REDIRECT_AFTER_AUTH }
  });
  if (error) {
    alert(i18n[currentLang].errGoogleFail + error.message);
  }
}
document.getElementById('googleLoginBtn').addEventListener('click', loginWithGoogle);
document.getElementById('googleSignupBtn').addEventListener('click', loginWithGoogle);
</script>

</body>
</html>
