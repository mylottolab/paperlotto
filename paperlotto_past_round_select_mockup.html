<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>과거 회차 선택 — PaperLotto</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --board:#0c1020; --board-2:#111731; --board-line:#242c4d;
  --paper:#f6f1e4; --ink:#1c2130; --ink-dim:#5b5646;
  --gold:#b8862e; --gold-bright:#e0aa4e;
  --text-hi:#f2efe4; --text-mid:#a7adc7; --text-dim:#6b7195;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--board); color:var(--text-hi); min-height:100vh;
  font-family:'Inter',sans-serif; word-break:keep-all;
  background-image:linear-gradient(var(--board-line) 1px, transparent 1px), linear-gradient(90deg, var(--board-line) 1px, transparent 1px);
  background-size:64px 64px;
}
h1,h2{ font-family:'Fraunces',serif; margin:0; }
a{ color:inherit; text-decoration:none; }
.mono{ font-family:'IBM Plex Mono',monospace; }

header{
  position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between;
  padding:18px 32px; border-bottom:1px solid var(--board-line); flex-wrap:wrap; gap:10px;
  background:rgba(12,16,32,0.9); backdrop-filter:blur(6px);
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{ width:30px; height:30px; border-radius:6px; background:linear-gradient(135deg,var(--gold-bright),var(--gold)); display:flex; align-items:center; justify-content:center; color:var(--ink); font-weight:700; font-family:'Fraunces',serif; transform:rotate(-4deg); }
.brand-name{ font-size:17px; font-weight:600; }
.brand-name em{ font-style:normal; color:var(--gold-bright); }
nav{ display:flex; align-items:center; gap:18px; font-size:13.5px; color:var(--text-mid); }
.lang-toggle{ display:flex; border:1px solid var(--board-line); border-radius:20px; overflow:hidden; }
.lang-toggle button{ border:none; background:transparent; color:var(--text-dim); font-size:12px; font-weight:600; padding:6px 12px; cursor:pointer; font-family:'Inter',sans-serif; }
.lang-toggle button.active{ background:var(--gold); color:var(--ink); }

main{ max-width:720px; margin:0 auto; padding:28px 24px 90px; }

.page-title{ font-size:24px; font-weight:600; margin-bottom:6px; }
.page-sub{ font-size:13.5px; color:var(--text-mid); margin-bottom:26px; line-height:1.6; }

.panel{ background:var(--paper); color:var(--ink); border-radius:14px; padding:26px; margin-bottom:18px; }
.panel h3{ font-size:14.5px; margin-bottom:14px; color:var(--ink); }

.game-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; }
.game-card{
  border:1.5px solid rgba(28,33,48,0.14); border-radius:10px; padding:12px; cursor:pointer;
  text-align:center; font-size:12.5px; font-weight:600; background:#fff;
}
.game-card.active{ border-color:var(--gold); background:rgba(184,134,46,0.08); }
.game-card .flag{ font-size:20px; display:block; margin-bottom:6px; }

.year-strip{ display:flex; gap:8px; flex-wrap:wrap; }
.year-chip{
  padding:9px 16px; border-radius:20px; border:1.5px solid rgba(28,33,48,0.15);
  background:#fff; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; cursor:pointer;
}
.year-chip.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
.year-chip .cnt{ font-size:10px; color:var(--ink-dim); margin-left:4px; }
.year-chip.active .cnt{ color:var(--text-mid); }

.month-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-top:4px; }
.month-chip{
  padding:10px 0; text-align:center; border-radius:8px; border:1.5px solid rgba(28,33,48,0.12);
  background:#fff; font-size:12.5px; font-weight:600; cursor:pointer;
}
.month-chip.disabled{ opacity:0.3; cursor:default; pointer-events:none; }
.month-chip.active{ background:var(--gold); color:var(--ink); border-color:var(--gold); }

.round-list{ display:flex; flex-direction:column; gap:8px; margin-top:4px; max-height:420px; overflow-y:auto; }
.round-row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:12px 14px; border-radius:9px; border:1.5px solid rgba(28,33,48,0.12); background:#fff;
}
.round-row:hover{ border-color:var(--gold); }
.round-info{ display:flex; flex-direction:column; gap:2px; }
.round-date{ font-size:13px; font-weight:600; }
.round-no{ font-size:11px; color:var(--ink-dim); font-family:'IBM Plex Mono',monospace; }
.round-cta{
  font-size:12px; font-weight:600; padding:8px 14px; border-radius:7px;
  background:var(--ink); color:var(--paper); border:none; cursor:pointer; white-space:nowrap;
}
.round-cta:hover{ background:#2a3145; }

.empty-note{ font-size:12.5px; color:var(--ink-dim); text-align:center; padding:20px 0; }
.loading-note{ font-size:12.5px; color:var(--ink-dim); text-align:center; padding:20px 0; }

@media (max-width:640px){
  header{ padding:14px 16px; }
  nav{ gap:10px; }
  nav a{ font-size:12px; }
  main{ padding:20px 14px 70px; }
  .page-title{ font-size:20px; }
  .panel{ padding:18px 16px; }
  .game-grid{ grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:8px; }
  .game-card{ padding:9px 6px; font-size:11px; }
  .game-card .flag{ font-size:16px; margin-bottom:4px; }
  .year-chip{ padding:7px 12px; font-size:12px; }
  .month-grid{ grid-template-columns:repeat(4,1fr); gap:6px; }
  .month-chip{ padding:9px 0; font-size:11.5px; }
  .round-row{ flex-wrap:wrap; gap:8px; }
  .round-cta{ width:100%; text-align:center; }
  .round-list{ max-height:none; }
}
@media (max-width:380px){
  .game-grid{ grid-template-columns:repeat(auto-fill,minmax(84px,1fr)); }
  .month-grid{ grid-template-columns:repeat(3,1fr); }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">P</div>
    <div class="brand-name">Paper<em>Lotto</em></div>
  </div>
  <nav>
    <a href="paperlotto_hub_mockup.html" data-i18n="navBack">← 전체 게임</a>
    <div class="lang-toggle">
      <button data-lang="ko" type="button">KR</button>
      <button data-lang="en" class="active" type="button">EN</button>
      <button data-lang="ja" type="button">JA</button>
    </div>
  </nav>
</header>

<main>
  <div class="page-title" data-i18n="pageTitle">과거 회차 도전하기</div>
  <div class="page-sub" data-i18n="pageSub">이미 결과가 발표된 과거 회차를 골라, 그때로 돌아가 내 전략 번호를 등록하고 즉석에서 채점해볼 수 있어요.</div>

  <div class="panel">
    <h3 data-i18n="step1">STEP 1 · 게임 선택</h3>
    <div class="game-grid" id="gameGrid"></div>
  </div>

  <div class="panel" id="yearPanel" style="display:none;">
    <h3 data-i18n="step2">STEP 2 · 연도 선택</h3>
    <div class="year-strip" id="yearStrip"></div>
  </div>

  <div class="panel" id="monthPanel" style="display:none;">
    <h3 data-i18n="step3">STEP 3 · 월 선택</h3>
    <div class="month-grid" id="monthGrid"></div>
  </div>

  <div class="panel" id="roundPanel" style="display:none;">
    <h3 data-i18n="step4">STEP 4 · 회차 선택</h3>
    <div class="round-list" id="roundList"></div>
  </div>
</main>

<script>
const i18n = {
  ko: {
    navBack:"← 전체 게임",
    pageTitle:"과거 회차 도전하기",
    pageSub:"이미 결과가 발표된 과거 회차를 골라, 그때로 돌아가 내 전략 번호를 등록하고 즉석에서 채점해볼 수 있어요.",
    step1:"STEP 1 · 게임 선택", step2:"STEP 2 · 연도 선택", step3:"STEP 3 · 월 선택", step4:"STEP 4 · 회차 선택",
    loading:"불러오는 중…", noData:"이 게임은 아직 과거 데이터가 없습니다.",
    challengeBtn:"이 회차 도전하기 →",
    monthNames:["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"],
    roundLabel:function(n){ return n + "회차"; },
  },
  en: {
    navBack:"← All Games",
    pageTitle:"Challenge a Past Round",
    pageSub:"Pick a past round whose results are already known, go back to that moment, register your strategy numbers, and get graded instantly.",
    step1:"STEP 1 · Choose Game", step2:"STEP 2 · Choose Year", step3:"STEP 3 · Choose Month", step4:"STEP 4 · Choose Round",
    loading:"Loading…", noData:"No historical data for this game yet.",
    challengeBtn:"Challenge this round →",
    monthNames:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
    roundLabel:function(n){ return "Round " + n; },
  },
  ja: {
    navBack:"← すべてのゲーム",
    pageTitle:"過去の回に挑戦する",
    pageSub:"すでに結果が発表された過去の回を選んで、その時点に戻って戦略番号を登録し、その場で採点してみましょう。",
    step1:"STEP 1 · ゲーム選択", step2:"STEP 2 · 年選択", step3:"STEP 3 · 月選択", step4:"STEP 4 · 回選択",
    loading:"読み込み中…", noData:"このゲームの過去データはまだありません。",
    challengeBtn:"この回に挑戦する →",
    monthNames:["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"],
    roundLabel:function(n){ return "第" + n + "回"; },
  },
};
let currentLang = localStorage.getItem('paperlotto_lang') || 'en';
function applyLang(lang){
  currentLang = i18n[lang] ? lang : 'en';
  localStorage.setItem('paperlotto_lang', currentLang);
  document.documentElement.lang = currentLang;
  var t = i18n[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var key = el.getAttribute('data-i18n');
    if (typeof t[key] === 'string') el.innerHTML = t[key];
  });
  document.querySelectorAll('.lang-toggle button').forEach(function(b){ b.classList.toggle('active', b.dataset.lang === currentLang); });
  renderMonths(); renderRounds();
}
document.querySelectorAll('.lang-toggle button').forEach(function(btn){ btn.addEventListener('click', function(){ applyLang(btn.dataset.lang); }); });

const SUPABASE_URL = "https://wzrqaozlbfyejsbvnrxk.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_3KrYMzwrVlbYr-e9d8UiLA_KgvSs8tC";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

const GAMES = [
  { id:'kr_lotto645', flag:'🇰🇷', nameKo:'로또 6/45', nameEn:'Lotto 6/45', nameJa:'ロト6/45' },
  { id:'us_powerball', flag:'🇺🇸', nameKo:'파워볼', nameEn:'Powerball', nameJa:'パワーボール' },
  { id:'us_megamillions', flag:'🇺🇸', nameKo:'메가밀리언스', nameEn:'Mega Millions', nameJa:'メガミリオンズ' },
  { id:'eu_euromillions', flag:'🇪🇺', nameKo:'유로밀리언스', nameEn:'EuroMillions', nameJa:'ユーロミリオンズ' },
  { id:'jp_miniloto', flag:'🇯🇵', nameKo:'미니로또', nameEn:'Mini Loto', nameJa:'ミニロト' },
  { id:'jp_loto7', flag:'🇯🇵', nameKo:'로또7', nameEn:'Loto 7', nameJa:'ロト7' },
  { id:'jp_loto6', flag:'🇯🇵', nameKo:'로또6', nameEn:'Loto 6', nameJa:'ロト6' },
  { id:'ca_lottomax', flag:'🇨🇦', nameKo:'로또맥스', nameEn:'Lotto Max', nameJa:'ロトマックス' },
  { id:'ca_lotto649', flag:'🇨🇦', nameKo:'로또 6/49', nameEn:'Lotto 6/49', nameJa:'ロト6/49' },
  { id:'au_powerball', flag:'🇦🇺', nameKo:'호주 파워볼', nameEn:'AU Powerball', nameJa:'豪パワーボール' },
  { id:'au_ozlotto', flag:'🇦🇺', nameKo:'오즈로또', nameEn:'Oz Lotto', nameJa:'オズロト' },
  { id:'au_tattslotto', flag:'🇦🇺', nameKo:'새터데이로또', nameEn:'Tatts Lotto', nameJa:'サタデーロト' },
];

let selectedGame = null;
let allDraws = [];
let yearMap = {};
let selectedYear = null;
let selectedMonth = null;

function nameKey(){ return currentLang === 'ko' ? 'nameKo' : currentLang === 'ja' ? 'nameJa' : 'nameEn'; }

function renderGameGrid(){
  const grid = document.getElementById('gameGrid');
  grid.innerHTML = GAMES.map(function(g){
    return '<div class="game-card ' + (selectedGame===g.id?'active':'') + '" data-id="' + g.id + '"><span class="flag">' + g.flag + '</span>' + g[nameKey()] + '</div>';
  }).join('');
  grid.querySelectorAll('.game-card').forEach(function(el){
    el.addEventListener('click', function(){ selectGame(el.dataset.id); });
  });
}
renderGameGrid();

async function selectGame(gameId){
  selectedGame = gameId;
  selectedYear = null; selectedMonth = null;
  renderGameGrid();
  document.getElementById('yearPanel').style.display = 'block';
  document.getElementById('monthPanel').style.display = 'none';
  document.getElementById('roundPanel').style.display = 'none';
  document.getElementById('yearStrip').innerHTML = '<div class="loading-note">' + i18n[currentLang].loading + '</div>';

  const res = await sb.from('draw_results').select('round_no, draw_date').eq('game_id', gameId).order('draw_date', { ascending: false });
  allDraws = (!res.error && res.data) ? res.data : [];
  yearMap = {};
  allDraws.forEach(function(d){
    const y = d.draw_date.slice(0,4);
    const m = +d.draw_date.slice(5,7);
    if (!yearMap[y]) yearMap[y] = [];
    yearMap[y].push({ round_no: d.round_no, draw_date: d.draw_date, month: m });
  });
  renderYears();
}

function renderYears(){
  const strip = document.getElementById('yearStrip');
  const years = Object.keys(yearMap).sort(function(a,b){ return b.localeCompare(a); });
  if (years.length === 0) {
    strip.innerHTML = '<div class="empty-note">' + i18n[currentLang].noData + '</div>';
    return;
  }
  strip.innerHTML = years.map(function(y){
    return '<div class="year-chip ' + (selectedYear===y?'active':'') + '" data-year="' + y + '">' + y + '<span class="cnt">(' + yearMap[y].length + ')</span></div>';
  }).join('');
  strip.querySelectorAll('.year-chip').forEach(function(el){
    el.addEventListener('click', function(){
      selectedYear = el.dataset.year;
      selectedMonth = null;
      document.getElementById('monthPanel').style.display = 'block';
      document.getElementById('roundPanel').style.display = 'none';
      renderYears(); renderMonths();
    });
  });
}

function renderMonths(){
  const grid = document.getElementById('monthGrid');
  if (!selectedYear) { grid.innerHTML = ''; return; }
  const t = i18n[currentLang];
  const monthsWithData = new Set((yearMap[selectedYear]||[]).map(function(d){ return d.month; }));
  grid.innerHTML = t.monthNames.map(function(label, i){
    const m = i+1;
    const has = monthsWithData.has(m);
    return '<div class="month-chip ' + (has?'':'disabled') + ' ' + (selectedMonth===m?'active':'') + '" data-month="' + m + '">' + label + '</div>';
  }).join('');
  grid.querySelectorAll('.month-chip:not(.disabled)').forEach(function(el){
    el.addEventListener('click', function(){
      selectedMonth = +el.dataset.month;
      document.getElementById('roundPanel').style.display = 'block';
      renderMonths(); renderRounds();
    });
  });
}

function renderRounds(){
  const list = document.getElementById('roundList');
  if (!selectedYear || !selectedMonth) { list.innerHTML = ''; return; }
  const t = i18n[currentLang];
  const rounds = (yearMap[selectedYear]||[]).filter(function(d){ return d.month === selectedMonth; }).sort(function(a,b){ return b.draw_date.localeCompare(a.draw_date); });

  const locale = currentLang === 'ko' ? 'ko-KR' : currentLang === 'ja' ? 'ja-JP' : 'en-US';
  list.innerHTML = rounds.map(function(r){
    const dateStr = new Date(r.draw_date + 'T00:00:00').toLocaleDateString(locale, { year:'numeric', month:'long', day:'numeric', weekday:'short' });
    return '<div class="round-row"><div class="round-info"><div class="round-date">' + dateStr + '</div><div class="round-no mono">' + t.roundLabel(r.round_no) + '</div></div><button class="round-cta" data-round="' + r.round_no + '">' + t.challengeBtn + '</button></div>';
  }).join('');

  list.querySelectorAll('.round-cta').forEach(function(btn){
    btn.addEventListener('click', function(){
      const round = btn.dataset.round;
      window.location.href = 'paperlotto_register_mockup.html?game=' + selectedGame + '&round=' + round + '&mode=past';
    });
  });
}

applyLang(currentLang);
</script>

</body>
</html>
