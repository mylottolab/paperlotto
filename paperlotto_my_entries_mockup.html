<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 등록내역 — PaperLotto</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --board:#0c1020; --board-2:#111731; --board-line:#242c4d;
  --paper:#f6f1e4; --ink:#1c2130; --ink-dim:#5b5646;
  --gold:#b8862e; --gold-bright:#e0aa4e;
  --text-hi:#f2efe4; --text-mid:#a7adc7; --text-dim:#6b7195;
  --ok:#1f7a4f; --err:#c65a2e;
}
*{box-sizing:border-box;}
body{
  margin:0; background:var(--board); color:var(--text-hi); min-height:100vh;
  font-family:'Inter',sans-serif; word-break:keep-all;
  background-image:linear-gradient(var(--board-line) 1px, transparent 1px), linear-gradient(90deg, var(--board-line) 1px, transparent 1px);
  background-size:64px 64px;
}
h1,h2{ font-family:'Fraunces',serif; margin:0; }
a{ color:inherit; text-decoration:none; }
.mono{ font-family:'IBM Plex Mono',monospace; }

header{
  position:sticky; top:0; z-index:5; display:flex; align-items:center; justify-content:space-between;
  padding:18px 32px; border-bottom:1px solid var(--board-line); flex-wrap:wrap; gap:10px;
  background:rgba(12,16,32,0.9); backdrop-filter:blur(6px);
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{ width:30px; height:30px; border-radius:6px; background:linear-gradient(135deg,var(--gold-bright),var(--gold)); display:flex; align-items:center; justify-content:center; color:var(--ink); font-weight:700; font-family:'Fraunces',serif; transform:rotate(-4deg); }
.brand-name{ font-size:17px; font-weight:600; }
.brand-name em{ font-style:normal; color:var(--gold-bright); }
nav{ display:flex; align-items:center; gap:18px; font-size:13.5px; color:var(--text-mid); }
.lang-toggle{ display:flex; border:1px solid var(--board-line); border-radius:20px; overflow:hidden; }
.lang-toggle button{ border:none; background:transparent; color:var(--text-dim); font-size:12px; font-weight:600; padding:6px 12px; cursor:pointer; font-family:'Inter',sans-serif; }
.lang-toggle button.active{ background:var(--gold); color:var(--ink); }

main{ max-width:820px; margin:0 auto; padding:28px 24px 90px; }

.page-title{ font-size:24px; font-weight:600; margin-bottom:18px; }

.badge-row{ display:flex; gap:12px; flex-wrap:wrap; margin-bottom:22px; }
.badge{ background:var(--paper); color:var(--ink); border-radius:12px; padding:16px 20px; flex:1; min-width:140px; }
.badge .num{ font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:700; color:#8a5b1c; }
.badge .label{ font-size:12px; color:var(--ink-dim); margin-top:2px; }

.toolbar{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
.toolbar select{
  padding:9px 12px; border-radius:8px; border:1.5px solid var(--board-line); background:var(--board-2);
  color:var(--text-hi); font-size:13px; font-family:'Inter',sans-serif;
}
.toolbar .spacer{ flex:1; }
.tb-btn{
  padding:9px 16px; border-radius:8px; border:1.5px solid var(--board-line); background:var(--board-2);
  color:var(--text-hi); font-size:12.5px; font-weight:600; cursor:pointer;
}
.tb-btn:hover{ border-color:var(--gold); }
.tb-btn.primary{ background:var(--gold); color:var(--ink); border-color:var(--gold); }
.tb-btn:disabled{ opacity:0.4; cursor:not-allowed; }

.list-wrap{ background:var(--paper); color:var(--ink); border-radius:14px; overflow:hidden; }
.entry-row{
  display:flex; align-items:center; gap:12px; padding:14px 18px;
  border-bottom:1px solid rgba(28,33,48,0.08);
}
.entry-row:last-child{ border-bottom:none; }
.entry-row input[type="checkbox"]{ width:16px; height:16px; flex-shrink:0; }
.entry-game{ font-size:11px; font-weight:700; color:var(--ink-dim); width:64px; flex-shrink:0; }
.entry-round{ font-size:11px; color:var(--ink-dim); font-family:'IBM Plex Mono',monospace; width:76px; flex-shrink:0; }
.entry-numbers{ flex:1; display:flex; gap:4px; flex-wrap:wrap; min-width:0; }
.pip{ width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; background:rgba(28,33,48,0.07); color:var(--ink-dim); flex-shrink:0; }
.pip.bonus{ background:var(--gold); color:var(--ink); }
.entry-grade{ font-size:11.5px; font-weight:700; padding:4px 10px; border-radius:12px; white-space:nowrap; flex-shrink:0; }
.grade-win{ background:rgba(31,122,79,0.14); color:var(--ok); }
.grade-lose{ background:rgba(28,33,48,0.08); color:var(--ink-dim); }
.grade-pending{ background:rgba(184,134,46,0.14); color:#8a5b1c; }
.entry-action{ flex-shrink:0; }
.grade-btn{
  font-size:11px; font-weight:600; padding:6px 10px; border-radius:6px;
  background:var(--ink); color:var(--paper); border:none; cursor:pointer;
}
.grade-btn:disabled{ opacity:0.5; cursor:default; }

.empty-note, .loading-note{ text-align:center; padding:40px 0; font-size:13px; color:var(--ink-dim); }

@media (max-width:640px){
  header{ padding:14px 16px; }
  nav{ gap:10px; }
  main{ padding:20px 14px 70px; }
  .page-title{ font-size:20px; }
  .badge-row{ gap:8px; }
  .badge{ min-width:0; flex:1 1 42%; padding:12px 14px; }
  .badge .num{ font-size:19px; }
  .badge .label{ font-size:10.5px; }
  .toolbar{ gap:8px; }
  .toolbar select{ flex:1 1 100%; }
  .tb-btn{ flex:1 1 auto; font-size:11.5px; padding:9px 10px; }

  .entry-row{
    flex-wrap:wrap; padding:12px 14px; row-gap:8px;
  }
  .entry-row input[type="checkbox"]{ order:1; }
  .entry-game{ order:2; width:auto; }
  .entry-round{ order:3; width:auto; }
  .entry-grade{ order:4; margin-left:auto; }
  .entry-numbers{ order:6; flex:1 1 100%; }
  .entry-action{ order:5; }
  .pip{ width:22px; height:22px; font-size:10px; }
}
@media (max-width:380px){
  .badge{ flex:1 1 100%; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">P</div>
    <div class="brand-name">Paper<em>Lotto</em></div>
  </div>
  <nav>
    <a href="paperlotto_hub_mockup.html" data-i18n="navBack">← 전체 게임</a>
    <div class="lang-toggle">
      <button data-lang="ko" type="button">KR</button>
      <button data-lang="en" class="active" type="button">EN</button>
      <button data-lang="ja" type="button">JA</button>
    </div>
  </nav>
</header>

<main>
  <div class="page-title" data-i18n="pageTitle">내 등록내역</div>

  <div class="badge-row">
    <div class="badge"><div class="num" id="badgeTotal">–</div><div class="label" data-i18n="badgeTotal">전체 등록</div></div>
    <div class="badge"><div class="num" id="badgeGraded">–</div><div class="label" data-i18n="badgeGraded">채점 완료</div></div>
    <div class="badge"><div class="num" id="badgePending">–</div><div class="label" data-i18n="badgePending">채점 대기</div></div>
    <div class="badge"><div class="num" id="badgeWin">–</div><div class="label" data-i18n="badgeWin">당첨(1~5등)</div></div>
  </div>

  <div class="toolbar">
    <select id="filterGame"><option value="" data-i18n="filterAllGames">전체 게임</option></select>
    <select id="filterYear"><option value="" data-i18n="filterAllYears">전체 연도</option></select>
    <div class="spacer"></div>
    <button class="tb-btn" id="bulkGradeBtn" data-i18n="bulkGrade">전체 채점하기</button>
    <button class="tb-btn" id="exportSelectedBtn" data-i18n="exportSelected">선택 항목 내보내기 (50P)</button>
    <button class="tb-btn primary" id="toWatchlistBtn" data-i18n="toWatchlist">관심번호로 이동</button>
  </div>

  <div class="list-wrap" id="listWrap">
    <div class="loading-note" data-i18n="loading">불러오는 중…</div>
  </div>
</main>

<script>
const i18n = {
  ko: {
    navBack:"← 전체 게임", pageTitle:"내 등록내역",
    badgeTotal:"전체 등록", badgeGraded:"채점 완료", badgePending:"채점 대기", badgeWin:"당첨(1~5등)",
    filterAllGames:"전체 게임", filterAllYears:"전체 연도",
    bulkGrade:"전체 채점하기", exportSelected:"선택 항목 내보내기 (50P)", toWatchlist:"관심번호로 이동",
    loading:"불러오는 중…", empty:"아직 등록한 조합이 없습니다.", loginNeeded:"로그인이 필요합니다.",
    gradeWait:"채점 대기", gradeLose:"낙첨", gradeBtn:"확인", gradeBtnLoading:"확인 중…",
    gradeTier:function(n){ return n + "등"; },
    selectAtLeastOne:"먼저 항목을 선택해주세요.",
  },
  en: {
    navBack:"← All Games", pageTitle:"My Entries",
    badgeTotal:"Total Entries", badgeGraded:"Graded", badgePending:"Pending", badgeWin:"Winners (Tier 1–5)",
    filterAllGames:"All Games", filterAllYears:"All Years",
    bulkGrade:"Grade All", exportSelected:"Export Selected (50P)", toWatchlist:"Move to Watchlist",
    loading:"Loading…", empty:"No entries registered yet.", loginNeeded:"Please log in.",
    gradeWait:"Pending", gradeLose:"No win", gradeBtn:"Check", gradeBtnLoading:"Checking…",
    gradeTier:function(n){ return "Tier " + n; },
    selectAtLeastOne:"Please select at least one item first.",
  },
  ja: {
    navBack:"← すべてのゲーム", pageTitle:"登録した番号",
    badgeTotal:"登録合計", badgeGraded:"採点済み", badgePending:"採点待ち", badgeWin:"当選(1〜5等)",
    filterAllGames:"すべてのゲーム", filterAllYears:"すべての年",
    bulkGrade:"一括採点", exportSelected:"選択項目をエクスポート (50P)", toWatchlist:"関心番号へ移動",
    loading:"読み込み中…", empty:"まだ登録した組み合わせがありません。", loginNeeded:"ログインが必要です。",
    gradeWait:"採点待ち", gradeLose:"落選", gradeBtn:"確認", gradeBtnLoading:"確認中…",
    gradeTier:function(n){ return n + "等"; },
    selectAtLeastOne:"まず項目を選択してください。",
  },
};
let currentLang = localStorage.getItem('paperlotto_lang') || 'en';
function applyLang(lang){
  currentLang = i18n[lang] ? lang : 'en';
  localStorage.setItem('paperlotto_lang', currentLang);
  document.documentElement.lang = currentLang;
  var t = i18n[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var key = el.getAttribute('data-i18n');
    if (typeof t[key] === 'string') el.innerHTML = t[key];
  });
  document.querySelectorAll('.lang-toggle button').forEach(function(b){ b.classList.toggle('active', b.dataset.lang === currentLang); });
  renderList();
}
document.querySelectorAll('.lang-toggle button').forEach(function(btn){ btn.addEventListener('click', function(){ applyLang(btn.dataset.lang); }); });

const SUPABASE_URL = "https://wzrqaozlbfyejsbvnrxk.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_3KrYMzwrVlbYr-e9d8UiLA_KgvSs8tC";
const SELF_GRADE_URL = "https://wzrqaozlbfyejsbvnrxk.supabase.co/functions/v1/self-grade";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

const GAME_LABELS = {
  kr_lotto645:'KR', us_powerball:'US-PB', us_megamillions:'US-MM', eu_euromillions:'EU',
  jp_miniloto:'JP-MINI', jp_loto7:'JP-L7', jp_loto6:'JP-L6', ca_lottomax:'CA-MAX',
  ca_lotto649:'CA-649', au_powerball:'AU-PB', au_ozlotto:'AU-OZ', au_tattslotto:'AU-TATTS',
};

let allEntries = [];
let accessToken = null;

async function loadEntries(){
  const listWrap = document.getElementById('listWrap');
  const t = i18n[currentLang];

  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    listWrap.innerHTML = '<div class="empty-note">' + t.loginNeeded + '</div>';
    return;
  }
  accessToken = session.access_token;

  const { data, error } = await sb
    .from('entries')
    .select('id, game_id, round_no, main_numbers, bonus_numbers, grade, memo, created_at')
    .eq('user_id', session.user.id)
    .eq('confirmed', true)
    .order('created_at', { ascending: false });

  allEntries = (!error && data) ? data : [];
  populateFilters();
  renderBadges();
  renderList();
}

function populateFilters(){
  const gameSel = document.getElementById('filterGame');
  const yearSel = document.getElementById('filterYear');
  const games = [...new Set(allEntries.map(e => e.game_id))];
  const years = [...new Set(allEntries.map(e => e.created_at.slice(0,4)))].sort().reverse();

  gameSel.innerHTML = '<option value="" data-i18n="filterAllGames">' + i18n[currentLang].filterAllGames + '</option>' +
    games.map(g => '<option value="' + g + '">' + (GAME_LABELS[g] || g) + '</option>').join('');
  yearSel.innerHTML = '<option value="" data-i18n="filterAllYears">' + i18n[currentLang].filterAllYears + '</option>' +
    years.map(y => '<option value="' + y + '">' + y + '</option>').join('');

  gameSel.addEventListener('change', renderList);
  yearSel.addEventListener('change', renderList);
}

function renderBadges(){
  const total = allEntries.length;
  const graded = allEntries.filter(e => e.grade !== null && e.grade !== undefined).length;
  const pending = total - graded;
  const win = allEntries.filter(e => e.grade !== null && e.grade !== undefined && e.grade > 0).length;
  document.getElementById('badgeTotal').textContent = total;
  document.getElementById('badgeGraded').textContent = graded;
  document.getElementById('badgePending').textContent = pending;
  document.getElementById('badgeWin').textContent = win;
}

function renderList(){
  const listWrap = document.getElementById('listWrap');
  const t = i18n[currentLang];
  const gameFilter = document.getElementById('filterGame') ? document.getElementById('filterGame').value : '';
  const yearFilter = document.getElementById('filterYear') ? document.getElementById('filterYear').value : '';

  let rows = allEntries;
  if (gameFilter) rows = rows.filter(e => e.game_id === gameFilter);
  if (yearFilter) rows = rows.filter(e => e.created_at.slice(0,4) === yearFilter);

  if (rows.length === 0) {
    listWrap.innerHTML = '<div class="empty-note">' + t.empty + '</div>';
    return;
  }

  listWrap.innerHTML = rows.map(function(e){
    const mainPips = (e.main_numbers||[]).map(n => '<span class="pip">' + n + '</span>').join('');
    const bonusPips = (e.bonus_numbers||[]).map(n => '<span class="pip bonus">' + n + '</span>').join('');
    let gradeHtml;
    if (e.grade === null || e.grade === undefined) {
      gradeHtml = '<span class="entry-grade grade-pending">' + t.gradeWait + '</span>';
    } else if (e.grade === 0) {
      gradeHtml = '<span class="entry-grade grade-lose">' + t.gradeLose + '</span>';
    } else {
      gradeHtml = '<span class="entry-grade grade-win">' + t.gradeTier(e.grade) + '</span>';
    }
    const actionHtml = (e.grade === null || e.grade === undefined)
      ? '<button class="grade-btn" data-id="' + e.id + '">' + t.gradeBtn + '</button>'
      : '';
    return '<div class="entry-row" data-id="' + e.id + '">' +
      '<input type="checkbox" class="entry-check" data-id="' + e.id + '">' +
      '<div class="entry-game">' + (GAME_LABELS[e.game_id] || e.game_id) + '</div>' +
      '<div class="entry-round mono">#' + e.round_no + '</div>' +
      '<div class="entry-numbers">' + mainPips + bonusPips + '</div>' +
      gradeHtml +
      '<div class="entry-action">' + actionHtml + '</div>' +
      '</div>';
  }).join('');

  listWrap.querySelectorAll('.grade-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ gradeOne(btn.dataset.id, btn); });
  });
}

async function gradeOne(entryId, btnEl){
  const t = i18n[currentLang];
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = t.gradeBtnLoading; }
  try {
    const resp = await fetch(SELF_GRADE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
      body: JSON.stringify({ entry_id: entryId }),
    });
    const data = await resp.json();
    if (data.ok) {
      const entry = allEntries.find(e => e.id === entryId);
      if (entry) entry.grade = data.grade;
      renderBadges();
      renderList();
    } else {
      alert(data.reason || data.error || 'Failed');
      if (btnEl) { btnEl.disabled = false; btnEl.textContent = t.gradeBtn; }
    }
  } catch (e) {
    alert(e.message);
    if (btnEl) { btnEl.disabled = false; btnEl.textContent = t.gradeBtn; }
  }
}

document.getElementById('bulkGradeBtn').addEventListener('click', async function(){
  const btn = this;
  btn.disabled = true;
  try {
    const resp = await fetch(SELF_GRADE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + accessToken },
      body: JSON.stringify({ bulk: true }),
    });
    const data = await resp.json();
    if (data.success) {
      await loadEntries();
    } else {
      alert(data.error || 'Failed');
    }
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('exportSelectedBtn').addEventListener('click', function(){
  const t = i18n[currentLang];
  const ids = Array.from(document.querySelectorAll('.entry-check:checked')).map(c => c.dataset.id);
  if (ids.length === 0) { alert(t.selectAtLeastOne); return; }
  alert('Excel/PDF export (50P) — coming soon. Selected: ' + ids.length);
});

document.getElementById('toWatchlistBtn').addEventListener('click', function(){
  const t = i18n[currentLang];
  const ids = Array.from(document.querySelectorAll('.entry-check:checked')).map(c => c.dataset.id);
  if (ids.length === 0) { alert(t.selectAtLeastOne); return; }
  alert('Watchlist feature — coming soon. Selected: ' + ids.length);
});

applyLang(currentLang);
loadEntries();
</script>

</body>
</html>
